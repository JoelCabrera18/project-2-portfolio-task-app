<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">
  @for (workspace of workspaces.value(); track workspace.id) {
  <workspace-card [workspace]="workspace" (delete)="openDeleteWorkspaceConfirm($event)" (edit)="selectWorkspace($event)" />
  }

  <button (click)="createWorkspace()"
    class="h-full min-h-[200px] border-2 border-dashed border-slate-200 dark:border-slate-700 rounded-xl flex flex-col items-center justify-center gap-3 text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300 hover:border-slate-300 dark:hover:border-slate-600 hover:bg-slate-50/50 dark:hover:bg-slate-800/50 transition cursor-pointer">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
      stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="5" x2="12" y2="19" />
      <line x1="5" y1="12" x2="19" y2="12" />
    </svg>
    <span class="text-sm font-medium">{{ 'workspace.list.newWorkspace' | translate }}</span>
  </button>
</div>

<shared-modal [open]="openModal()" [title]="titleModal()" (close)="toggleModal()">
  <workspace-form modal-body [workspace]="workspace()" (cancel)="toggleModal()" (saved)="workspaceCreatedOrUpdated()">
  </workspace-form>
</shared-modal>

<shared-modal [open]="!!deleteWorkspaceTarget()" (close)="closeDeleteWorkspaceConfirm()" [title]="'common.delete' | translate" [size]="'sm'">
  <div modal-body class="space-y-4">
    <p class="text-sm text-slate-600 dark:text-slate-300 leading-relaxed">
      {{ 'workspace.list.deleteConfirm' | translate }}
    </p>
    <p class="text-sm text-slate-500 dark:text-slate-400 leading-relaxed">
      {{ 'workspace.list.deleteConfirmDesc' | translate }}
    </p>
    <div class="flex items-center gap-3 pt-2">
      <button (click)="closeDeleteWorkspaceConfirm()"
        class="flex-1 px-4 py-2.5 text-sm font-medium text-slate-600 bg-white border border-slate-200 rounded-lg hover:bg-slate-50 hover:border-slate-300 transition dark:text-slate-300 dark:bg-slate-900 dark:border-slate-700 dark:hover:bg-slate-800 dark:hover:border-slate-600">
        {{ 'common.cancel' | translate }}
      </button>
      <button (click)="onConfirmDeleteWorkspace()" [disabled]="deleting()"
        class="flex-1 px-4 py-2.5 text-sm font-medium text-white bg-[#ef4444] rounded-lg hover:bg-[#dc2626] transition disabled:opacity-50 disabled:cursor-not-allowed shadow-lg shadow-red-500/25 active:scale-[0.97] inline-flex items-center justify-center gap-2">
        @if (deleting()) {
        <svg class="w-4 h-4 animate-spin" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" stroke-dasharray="31.4 31.4" stroke-linecap="round" opacity="0.3" />
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" stroke-dasharray="31.4 31.4" stroke-linecap="round" stroke-dashoffset="20" />
        </svg>
        {{ 'common.deleting' | translate }}
        } @else {
        {{ 'common.delete' | translate }}
        }
      </button>
    </div>
  </div>
</shared-modal>
