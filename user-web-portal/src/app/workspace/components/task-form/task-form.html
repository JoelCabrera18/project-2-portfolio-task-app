<form [formGroup]="taskForm" (ngSubmit)="submit()" class="space-y-5">
  <div>
    <label class="block text-sm font-medium text-slate-700 mb-1.5 dark:text-slate-200" for="ws-name">Title</label>
    <input id="ws-name"
      class="w-full px-4 py-2.5 text-sm bg-white border border-slate-200 rounded-lg text-slate-700 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-[#ef4444]/20 focus:border-[#ef4444] transition dark:bg-slate-900 dark:border-slate-700 dark:text-slate-200 dark:placeholder:text-slate-500"
      type="text" [placeholder]="'workspace.taskForm.titlePlaceholder' | translate" formControlName="title" autofocus />
  </div>

  <div>
    <label class="block text-sm font-medium text-slate-700 mb-1.5 dark:text-slate-200" for="ws-desc">Description (optional)</label>
    <textarea id="ws-desc"
      class="w-full px-4 py-2.5 text-sm bg-white border border-slate-200 rounded-lg text-slate-700 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-[#ef4444]/20 focus:border-[#ef4444] transition resize-none dark:bg-slate-900 dark:border-slate-700 dark:text-slate-200 dark:placeholder:text-slate-500"
      [placeholder]="'workspace.taskForm.descPlaceholder' | translate" rows="3" formControlName="description"></textarea>
  </div>

  <!-- <div>
    <label class="block text-sm font-medium text-slate-700 mb-1.5">Color</label>
    <div class="flex gap-2.5 flex-wrap">
      @for (c of presetColors; track c) {
      <button type="button"
        class="w-9 h-9 rounded-full border-2 border-transparent cursor-pointer transition-all hover:scale-110 focus:outline-none focus:ring-2 focus:ring-[#ef4444] focus:ring-offset-2"
        [class.border-slate-800!]="taskForm.value.color === c" [class.ring-2]="taskForm.value.color === c"
        [class.ring-[#ef4444]]="taskForm.value.color === c" [class.ring-offset-2]="taskForm.value.color === c"
        [style.background]="c" (click)="selectColor(c)" [attr.aria-label]="'Color ' + c"></button>
      }
    </div>
  </div> -->

  <div class="grid grid-cols-2 gap-4">
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1.5 dark:text-slate-200" for="task-dateInit">{{ 'workspace.taskForm.dateInit' | translate }}</label>
      <input id="task-dateInit"
        class="w-full px-4 py-2.5 text-sm bg-white border border-slate-200 rounded-lg text-slate-700 focus:outline-none focus:ring-2 focus:ring-[#ef4444]/20 focus:border-[#ef4444] transition dark:bg-slate-900 dark:border-slate-700 dark:text-slate-200"
        type="date" formControlName="dateInit" />
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1.5 dark:text-slate-200" for="task-dateEnd">{{ 'workspace.taskForm.dateEnd' | translate }}</label>
      <input id="task-dateEnd"
        class="w-full px-4 py-2.5 text-sm bg-white border border-slate-200 rounded-lg text-slate-700 focus:outline-none focus:ring-2 focus:ring-[#ef4444]/20 focus:border-[#ef4444] transition dark:bg-slate-900 dark:border-slate-700 dark:text-slate-200"
        type="date" formControlName="dateEnd" />
    </div>
  </div>

  @if (taskForm.errors?.['dateRange'] && (taskForm.get('dateEnd')?.dirty || taskForm.get('dateEnd')?.touched)) {
  <p class="text-xs text-red-500 flex items-center gap-1">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
      stroke-linecap="round" stroke-linejoin="round" class="shrink-0">
      <circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="12" /><line x1="12" y1="16" x2="12.01" y2="16" />
    </svg>
    {{ 'workspace.taskForm.dateRangeError' | translate }}
  </p>
  }

  <div class="flex items-center justify-end gap-3 pt-2">
    <button
      class="px-5 py-2.5 text-sm font-medium text-slate-600 bg-white border border-slate-200 rounded-lg hover:bg-slate-50 hover:border-slate-300 transition dark:text-slate-300 dark:bg-slate-900 dark:border-slate-700 dark:hover:bg-slate-800 dark:hover:border-slate-600"
      type="button" (click)="cancelAction()">
      {{ 'common.cancel' | translate }}
    </button>
    <button
      class="px-5 py-2.5 text-sm font-medium text-white bg-[#ef4444] rounded-lg hover:bg-[#dc2626] shadow-lg shadow-red-500/25 transition disabled:opacity-50 disabled:cursor-not-allowed inline-flex items-center justify-center gap-2"
      type="submit" [disabled]="submitting() || !canSubmit()">
      @if (submitting()) {
      <svg class="w-4 h-4 animate-spin" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" stroke-dasharray="31.4 31.4" stroke-linecap="round" opacity="0.3" />
        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" stroke-dasharray="31.4 31.4" stroke-linecap="round" stroke-dashoffset="20" />
      </svg>
      {{ task() ? ('workspace.taskForm.updateButton' | translate) : ('workspace.taskForm.createButton' | translate) }}
      } @else {
      {{ task() ? ('workspace.taskForm.updateTitle' | translate) : ('workspace.taskForm.createTitle' | translate) }}
      }
    </button>
  </div>
</form>
