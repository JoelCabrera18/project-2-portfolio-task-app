<div (click)="onPreview()"
  class="group relative bg-white dark:bg-slate-900 rounded-xl border border-slate-100 dark:border-slate-700/50 hover:border-slate-200 dark:hover:border-slate-600 hover:shadow-sm dark:hover:shadow-none transition-all duration-200 cursor-pointer overflow-hidden">

  <div class="absolute left-0 top-0 bottom-0 w-[3px] rounded-full" [style.background]="accentColor()"></div>

  <div class="pl-[15px] pr-3.5 pt-3.5 pb-3.5">
    <div class="flex items-center gap-3.5">
      <div
        class="relative w-10 h-10 rounded-lg shrink-0 flex items-center justify-center overflow-hidden"
        [style.background]="accentColor() + '10'"
        [style.color]="accentColor()">
        @if (isImage() && attachment().thumbnailUrl) {
          <img [src]="attachment().thumbnailUrl" [alt]="attachment().fileName"
            class="w-full h-full object-cover rounded-lg" loading="lazy" />
          <div class="absolute inset-0 rounded-lg ring-1 ring-inset ring-black/5 dark:ring-white/10"></div>
        } @else {
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
            <polyline points="14 2 14 8 20 8" />
            @if (fileExt() === 'pdf') {
            <line x1="16" y1="13" x2="8" y2="13" />
            <line x1="16" y1="17" x2="8" y2="17" />
            <polyline points="10 9 9 9 8 9" />
            } @else if (fileExt() === 'doc' || fileExt() === 'docx') {
            <line x1="16" y1="13" x2="8" y2="13" />
            <line x1="16" y1="17" x2="8" y2="17" />
            <polyline points="10 9 9 9 8 9" />
            } @else if (fileExt() === 'xls' || fileExt() === 'xlsx') {
            <line x1="8" y1="12" x2="16" y2="12" />
            <line x1="8" y1="16" x2="16" y2="16" />
            <line x1="12" y1="12" x2="12" y2="16" />
            } @else if (fileExt() === 'ppt' || fileExt() === 'pptx') {
            <line x1="12" y1="11" x2="12" y2="17" />
            <line x1="9" y1="14" x2="15" y2="14" />
            } @else {
            <line x1="16" y1="13" x2="8" y2="13" />
            <line x1="16" y1="17" x2="8" y2="17" />
            }
          </svg>
        }
      </div>

      <div class="flex-1 min-w-0">
        <p class="text-sm font-medium text-slate-700 dark:text-slate-200 truncate leading-tight">{{ attachment().fileName }}</p>
        <p class="text-xs text-slate-400 dark:text-slate-500 mt-0.5">{{ formattedSize() }} <span class="mx-1">·</span> {{ fileTypeLabel() }}</p>
      </div>

      <div class="flex items-center gap-0.5 opacity-0 group-hover:opacity-100 transition-all duration-200">
        <button (click)="onDownload($event)"
          class="w-8 h-8 rounded-lg flex items-center justify-center text-slate-300 dark:text-slate-600 hover:text-slate-500 dark:hover:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition-all"
          [title]="'workspace.attachment.download' | translate">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="7 10 12 15 17 10" />
            <line x1="12" y1="15" x2="12" y2="3" />
          </svg>
        </button>
        @if (workspace()?.userRelation?.roleMember !== 'viewer') {
        <button (click)="onDelete($event)"
          class="w-8 h-8 rounded-lg flex items-center justify-center text-slate-300 dark:text-slate-600 hover:text-[#ef4444] hover:bg-red-50 dark:hover:bg-red-500/10 transition-all"
          [title]="'workspace.attachment.delete' | translate">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6" />
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
          </svg>
        </button>
        }
      </div>
    </div>
  </div>
</div>
