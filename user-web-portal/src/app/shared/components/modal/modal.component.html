@if (open()) {
  <div
    class="fixed inset-0 z-100 flex items-center justify-center bg-black/60 backdrop-blur-sm animate-fade-in"
    (click)="close.emit()"
  >
    <div
      class="bg-white dark:bg-slate-900 rounded-xl shadow-2xl dark:shadow-none max-h-[85vh] overflow-y-auto animate-scale-in max-w-[90vw] modal-scrollable"
      [style.width.px]="size() === 'sm' ? 360 : size() === 'lg' ? 640 : 460"
      (click)="$event.stopPropagation()"
    >
      <div class="flex items-center justify-between px-6 pt-5">
        <h2 class="text-[17px] font-semibold text-slate-800 dark:text-slate-100 m-0">{{ title() }}</h2>
        <button
          class="flex items-center justify-center w-8 h-8 rounded-lg text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition"
          (click)="close.emit()"
          type="button"
        >
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="px-6 pb-6 pt-5">
        <ng-content select="[modal-body]" />
      </div>
    </div>
  </div>
}
