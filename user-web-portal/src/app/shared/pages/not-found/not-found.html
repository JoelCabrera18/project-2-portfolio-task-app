<div class="min-h-screen bg-gradient-to-br from-slate-50 via-white to-slate-100 dark:from-slate-950 dark:via-slate-900 dark:to-slate-800/50 flex items-center justify-center p-4">
  <div class="w-full max-w-md animate-scale-in">
    <div class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-100 dark:border-slate-700/50 shadow-sm dark:shadow-none p-8 md:p-10 text-center">

      <!-- Accent bar -->
      <div class="flex justify-center mb-8">
        <div class="flex flex-col items-center gap-1">
          <div class="w-1 h-10 bg-[#ef4444] rounded-full"></div>
          <div class="w-1 h-4 bg-[#ef4444]/60 rounded-full"></div>
          <div class="w-1 h-2 bg-[#ef4444]/30 rounded-full"></div>
        </div>
      </div>

      <!-- 404 -->
      <h1 class="text-7xl md:text-8xl font-bold text-[#ef4444] tracking-tight leading-none mb-4">404</h1>

      <!-- Title -->
      <h2 class="text-lg font-bold text-slate-800 dark:text-slate-100 mb-2">Page not found</h2>

      <!-- Description -->
      <p class="text-sm text-slate-400 dark:text-slate-500 mb-8 max-w-xs mx-auto leading-relaxed">
        The page you're looking for doesn't exist or has been moved.
      </p>

      <!-- Authenticated actions -->
      @if (isAuthenticated) {
        <a routerLink="/workspace"
          class="inline-flex items-center justify-center gap-2 w-full px-5 py-3 bg-[#ef4444] hover:bg-[#dc2626] text-white text-sm font-bold rounded-xl shadow-lg shadow-red-500/25 transition-all active:scale-[0.97] mb-3">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5" />
            <polyline points="12 19 5 12 12 5" />
          </svg>
          Back to Workspaces
        </a>
        <a routerLink="/workspace"
          class="inline-flex items-center justify-center gap-2 text-sm text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300 transition">
          or go to Home
        </a>
      } @else {
        <!-- Guest action -->
        <a routerLink="/auth/login"
          class="inline-flex items-center justify-center gap-2 w-full px-5 py-3 bg-[#ef4444] hover:bg-[#dc2626] text-white text-sm font-bold rounded-xl shadow-lg shadow-red-500/25 transition-all active:scale-[0.97]">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5" />
            <polyline points="12 19 5 12 12 5" />
          </svg>
          Go to Login
        </a>
      }

    </div>
  </div>
</div>
