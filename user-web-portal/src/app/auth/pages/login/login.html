<div class="bg-slate-900 min-h-screen flex items-center justify-center p-4 md:p-8">

  <!-- Main Container -->
  <div
    class="bg-white dark:bg-slate-900 w-full max-w-5xl rounded-[3rem] overflow-hidden flex flex-col md:flex-row shadow-2xl dark:shadow-none">

    <!-- Left Section: Image & Visuals -->
    <div class="relative w-full md:w-1/2 h-[500px] md:h-auto overflow-hidden">
      <!-- Background Image -->
      <img src="login-art.png" alt="Space Art" class="absolute inset-0 w-full h-full object-contain"
        style="background-image: url('https://images.unsplash.com/photo-1614728263952-84ea206f99b6?auto=format&fit=crop&q=80&w=1000'); background-size: cover;">

      <!-- Overlay gradient for text readability -->
      <div class="absolute inset-0 bg-gradient-to-b from-black/40 via-transparent to-black/60"></div>

      <!-- Top Navigation -->
      <div class="absolute top-8 left-8 right-8 flex justify-between items-center text-white">
        <div class="flex items-center gap-6">
          <a [routerLink]="['/auth', 'signup']" class="text-sm font-medium hover:text-gray-300 transition">Sign Up</a>
        </div>
      </div>

      <!-- Bottom Profile Section -->
      <div class="absolute bottom-8 left-8 right-8 flex justify-between items-end text-white">
        <div class="flex items-center gap-3">
          <div class="w-12 h-12 rounded-full border-2 border-white overflow-hidden">
            <img src="https://i.pravatar.cc/150?u=andrew" alt="User" class="w-full h-full object-cover">
          </div>
          <div>
            <h3 class="font-bold text-lg leading-tight">Andrew.ui</h3>
            <p class="text-xs text-gray-300">UI & Illustration</p>
          </div>
        </div>
        <!-- Navigation Arrows -->
        <div class="flex gap-2">
          <button
            class="w-10 h-10 rounded-full border border-white/40 flex items-center justify-center hover:bg-white/20 transition">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
              stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
            </svg>
          </button>
          <button
            class="w-10 h-10 rounded-full border border-white/40 flex items-center justify-center hover:bg-white/20 transition">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
              stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Right Section: Login Form -->
    <div class="w-full md:w-1/2 p-8 md:p-16 flex flex-col justify-between">

      <!-- Header -->
      <div class="flex justify-between items-center mb-16">
        <span class="text-2xl font-bold tracking-tighter text-slate-800 dark:text-slate-100">{{appName}}</span>
        <div
          class="flex items-center gap-2 text-xs font-semibold text-gray-500 dark:text-slate-400 cursor-pointer hover:text-gray-800 dark:hover:text-slate-100 transition">
          <span class="text-lg">🇬🇧</span>
          <span>EN</span>
          <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
          </svg>
        </div>
      </div>

      <!-- Form Content -->
      <div class="flex-grow flex flex-col justify-center">
        <h1 class="text-4xl font-bold text-slate-800 dark:text-slate-100 mb-2">Hi Manager!</h1>
        <p class="text-gray-500 dark:text-slate-400 mb-8">Welcome to {{appName}}</p>

        <form class="space-y-4" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
          <div class="relative">
            <input type="email" placeholder="Email" formControlName="username"
              class="w-full px-5 py-4 bg-gray-50 dark:bg-slate-950 border border-gray-200 dark:border-slate-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-500/20 focus:border-red-500 transition">
          </div>
          <div class="relative">
            <input type="password" placeholder="Password" formControlName="password"
              class="w-full px-5 py-4 bg-gray-50 dark:bg-slate-950 border border-gray-200 dark:border-slate-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-500/20 focus:border-red-500 transition">
          </div>

          <div class="flex justify-end">
            <a [routerLink]="['/auth', 'forgot-password']" class="text-xs text-red-500 dark:text-red-400 font-medium hover:underline">Forgot password?</a>
          </div>

          <!-- Main Action -->
          <button type="submit" [disabled]="submitting()"
            class="w-full py-4 bg-[#ef4444] hover:bg-[#dc2626] disabled:opacity-60 disabled:cursor-not-allowed text-white font-bold rounded-xl shadow-lg shadow-red-500/30 transition transform active:scale-[0.98] inline-flex items-center justify-center gap-2">
            @if (submitting()) {
            <svg class="w-5 h-5 animate-spin" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" stroke-dasharray="31.4 31.4" stroke-linecap="round" opacity="0.3" />
              <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" stroke-dasharray="31.4 31.4" stroke-linecap="round" stroke-dashoffset="20" />
            </svg>
            Signing in...
            } @else {
            Login
            }
          </button>

        </form>
        <!-- Divider -->
        <div class="flex items-center gap-4 my-6">
          <div class="h-px bg-gray-200 dark:bg-slate-700 flex-grow"></div>
          <span class="text-xs text-gray-400 dark:text-slate-500 uppercase tracking-widest">or</span>
          <div class="h-px bg-gray-200 dark:bg-slate-700 flex-grow"></div>
        </div>

        <!-- Social Login -->
        <button type="button" (click)="googleLogin()"
          class="w-full flex items-center justify-center gap-3 px-5 py-4 border border-gray-200 dark:border-slate-700 rounded-xl text-gray-600 dark:text-slate-300 font-medium hover:bg-gray-50 dark:hover:bg-slate-800 transition">
          <img src="https://www.svgrepo.com/show/355037/google.svg" class="w-5 h-5" alt="Google">
          Login with Google
        </button>

        <p class="text-center text-sm text-gray-500 dark:text-slate-400 mt-8">
          Don't have an account?
          <a [routerLink]="['/auth', 'signup']"
            class="text-red-500 dark:text-red-400 font-bold hover:underline">Signup</a>
        </p>
      </div>
    </div>
  </div>
</div>
